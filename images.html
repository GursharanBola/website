<!DOCTYPE html>
<html>
<head>
    <title></title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFF; 
            margin: 0;
            height: 100vh; 
            cursor: pointer; 
            overflow: hidden; 
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            position: absolute;
            max-width: 60%; 
            max-height: 80vh;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            border: 2px solid #000;
            box-sizing: border-box; 
        }

        img.active {
            opacity: 1;
        }
    </style>
</head>
<body onclick="showNextImage()">

    <div class="container">
        <img src="resources/image1.png" class="active">
        <img src="resources/image2.png">
        <img src="resources/image3.png">
        <img src="resources/image4.png">
        <img src="resources/image5.png">
        <img src="resources/image6.png">
        <img src="resources/image7.png">
        <img src="resources/image8.png">
    </div>

    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('img');

        function showNextImage() {
            if (images.length === 0) return;
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }
    </script>
</body>
</html>
